<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Converter MVP</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <header class="hero">
            <div>
                <h1>CSV Conversion MVP</h1>
                <p> Select a conversion direction and upload the input CSV file to convert.</p>
            </div>
            <div class="hero-meta">
                <span id="versionInfo" class="badge">Version: loading…</span>
            </div>
        </header>

        <div id="mappingStatus" class="status hidden">Loading default mapping...</div>

        <section class="card">
            <h2>Conversion</h2>
            <div class="radio-group">
                <label><input type="radio" name="direction" value="evoToSdmx" checked /> ISO(EVO) → SDMX</label>
                <label><input type="radio" name="direction" value="sdmxToEvo" /> SDMX → ISO(EVO)</label>
            </div>
        </section>

        <section class="card">
            <h2>Upload</h2>
            <label class="file-input-label">
                <input id="inputFile" type="file" accept=".csv" />
                Choose CSV file
            </label>
            <div id="inputStatus" class="status">No input file selected.</div>
        </section>

        <section class="card actions">
            <button id="convertButton" disabled>Convert CSV</button>
            <div id="resultStatus" class="status"></div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>Output</h2>
                <button id="downloadButton" class="hidden" disabled>Save converted CSV</button>
                <button id="downloadSkippedButton" class="hidden" disabled>Save skipped rows</button>
            </div>
            <textarea id="outputText" readonly></textarea>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
